<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent News Summarizer</title>

    <!-- Bootstrap UI -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .main-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 15px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        h2 {
            background: -webkit-linear-gradient(45deg, #38bdf8, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
        }

        .summary-box {
            background-color: rgba(15, 23, 42, 0.6);
            border-left: 5px solid #a855f7;
            padding: 15px;
            border-radius: 10px;
            white-space: pre-wrap;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            color: #f8fafc;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .form-control, .form-select {
            background-color: rgba(15, 23, 42, 0.8);
            border: 1px solid #475569;
            color: #e2e8f0;
        }
        
        .form-control:focus, .form-select:focus {
            background-color: rgba(15, 23, 42, 0.9);
            border-color: #a855f7;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
            color: #ffffff;
        }

        .btn-primary {
            background: linear-gradient(45deg, #38bdf8, #8b5cf6);
            border: none;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: linear-gradient(45deg, #0284c7, #7c3aed);
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.6);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-container">
        <h2 class="text-center mb-4">🧠 Intelligent News Summarizer</h2>

        <form method="POST">
            <!-- Text Input -->
            <div class="mb-3">
                <label class="form-label"><strong>Paste News Article:</strong></label>
                <textarea 
                    name="news_text" 
                    id="newsText"
                    class="form-control" 
                    rows="10"
                    placeholder="Paste your news article here...">{{ original_text }}</textarea>
            </div>

            <!-- Language Selector -->
            <div class="mb-3">
                <label class="form-label"><strong>Select Language:</strong></label>
                <select name="language" id="languageSelect" class="form-select">
                    <option value="en" {% if selected_language == "en" %}selected{% endif %}>English</option>
                    <option value="hi" {% if selected_language == "hi" %}selected{% endif %}>Hindi</option>
                    <option value="fr" {% if selected_language == "fr" %}selected{% endif %}>French</option>
                    <option value="es" {% if selected_language == "es" %}selected{% endif %}>Spanish</option>
                    <option value="de" {% if selected_language == "de" %}selected{% endif %}>German</option>
                </select>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    ✨ Summarize
                </button>
                <button type="button" class="btn btn-secondary" onclick="clearText()">
                    🧹 Clear
                </button>
            </div>
        </form>

        <!-- Summary Section -->
        {% if summary %}
        <div class="mt-4">
            <h4>📄 Summarized News:</h4>
            <div class="summary-box" id="summaryText">
                {{ summary }}
            </div>

            <!-- 🎚 Audio Pointer Slider -->
            <div class="mt-3">
                <label class="form-label"><strong>🎧 Audio Progress:</strong></label>
                <input 
                    type="range" 
                    id="audioSlider" 
                    min="0" 
                    max="100" 
                    value="0" 
                    class="form-range">
            </div>

            <!-- Audio Control Buttons -->
            <div class="mt-3 d-flex flex-wrap gap-2">
                <button class="btn btn-success" onclick="playSpeech()">▶️ Play</button>
                <button class="btn btn-warning" onclick="pauseSpeech()">⏸ Pause</button>
                <button class="btn btn-info" onclick="resumeSpeech()">⏯ Resume</button>
                <button class="btn btn-danger" onclick="stopSpeech()">⏹ Stop</button>
            </div>
        </div>
        {% endif %}
    </div>
</div>

<!-- Link External JS -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
